<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
      color: white;
    }

    nav{
      background-color: rgb(44, 44, 109);
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    h1{
      padding: 20px;
      margin-left: 50px;
    }

    ul{
      margin-top: 5px;
      display: flex;
      gap: 20px;
      width: 30%;
      list-style: none; /* FIXED */
      justify-content: space-around;
    }

    @media(max-width:425px){
      nav{
        flex-direction: column;
        align-items: center;
      }

      ul{
        flex-direction: column;
        margin-top: 10px;
        width: 100%;
        align-items: center;
        gap: 10px;
      }
    }
  </style>

</head>
<body>
  <nav>
    <h1>Web Blogs</h1>
    <ul>
      <li>Home</li>
      <li>About</li>
      <li>Gallery</li>
      <li>Contact</li>
    </ul>
  </nav>

   <section>

              <h1>Welcome to My World</h1>
              <img src="./men_cloth_img.jpeg" alt="">

   </section>



</body>
</html>
